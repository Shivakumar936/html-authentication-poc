<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard | HTML Auth POC</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">Authentication System Styling</span>
       <a href="login.html"><button class="btn btn-light text-primary fw-semibold">Logout</button></a>
    </div>
</nav>

<!-- Dashboard Content -->
<div class="container mt-5">

    <div class="card p-4 text-center">
        <h2 class="mb-3">Welcome, User 👋</h2>
        <p class="text-muted">You have successfully logged into your dashboard.</p>
    </div>

    <!-- Extra Cards (looks more professional) -->
    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <i class="material-icons" style="font-size:36px">account_circle</i>
                <h5>Profile</h5>
                <p>Manage your account</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <i class="material-icons" style="font-size:36px">settings</i>
                <h5>Settings</h5>
                <p>Customize preferences</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 text-center">
                <i class="material-icons" style="font-size:36px;">analytics</i>
                <h5>Activity</h5>
                <p>View recent actions</p>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
