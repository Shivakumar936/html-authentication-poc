<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Reset Password | HTML Auth POC</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="center-screen">

<div class="card p-4" style="width: 380px;">

    <h4 class="text-center mb-3">Reset Password</h4>

    <form action="login.html">

        <!-- New Password -->
        <div class="mb-3">
            <label for="new-password" class="form-label">New Password</label>
            <div class="input-group">
                <input type="password" id="new-password" minlength="6" placeholder="Enter new password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('new-password')">👁</button>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label for="confirm-password" class="form-label">Confirm Password</label>
            <div class="input-group">
                <input type="password" id="confirm-password" minlength="6" placeholder="Confirm password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('confirm-password')">👁</button>
            </div>
        </div>
          <!-- Button -->
        <button type="submit" class="btn btn-success w-100">
            Update Password
        </button>

    </form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toggle Script -->
<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
